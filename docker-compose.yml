services:
  postgres:
    image: postgres:16-alpine
    container_name: menurest-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-menurest}
      POSTGRES_USER: ${DB_USER:-menurest}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-menurest}']
      interval: 10s
      timeout: 5s
      retries: 5

  mariadb:
    image: mariadb:10.6
    container_name: menurest-mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: menu_rest
    ports:
      - '3306:3306'
    volumes:
      - mariadbdata:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'healthcheck.sh', '--connect', '--innodb_initialized']
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: menurest-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: elasticsearch:8.12.0
    container_name: menurest-elastic
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - 'ES_JAVA_OPTS=-Xms512m -Xmx512m'
    ports:
      - '9200:9200'
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -s http://localhost:9200/_cluster/health | grep -q "green\|yellow"']
      interval: 30s
      timeout: 10s
      retries: 5

  garage:
    image: dxflrs/garage:v1.0.1
    container_name: menurest-garage
    restart: unless-stopped
    ports:
      - '3900:3900'   # S3 API
      - '3902:3902'   # Admin API
    volumes:
      - garagedata:/var/lib/garage/data
      - garagemeta:/var/lib/garage/meta
      - ./garage/garage.toml:/etc/garage.toml:ro
    healthcheck:
      test: ['CMD', 'curl', '-sf', 'http://localhost:3900/health']
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: menurest-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    ports:
      - '3001:3001'
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      ES_HOST: http://elasticsearch:9200
      MINIO_ENDPOINT: minio
      OLLAMA_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: qwen2.5:7b

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: menurest-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '3000:3000'
    env_file: .env
    environment:
      BACKEND_URL: http://backend:3001

  nginx:
    image: nginx:alpine
    container_name: menurest-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
      - garage
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/new-menu-rest.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro

volumes:
  pgdata:
  mariadbdata:
  redisdata:
  esdata:
  garagedata:
  garagemeta:
